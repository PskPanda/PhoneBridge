<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>PhoneBridge</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhoneBridge">
<meta name="theme-color" content="#0a0a14">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="icon" href="/assets/icon-192.png">
<style>
  :root {
    --bg: #0a0a14;
    --surface: #13131f;
    --card: #1a1a28;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b9d;
    --text: #f0f0f8;
    --muted: #7a7a9a;
    --radius: 16px;
    --font: -apple-system, 'SF Pro Display', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 40px);
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: env(safe-area-inset-top); background: var(--bg); z-index: 10;
  }
  .logo {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    box-shadow: 0 2px 8px rgba(108,99,255,0.3);
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .status-dot {
    margin-left: auto; width: 8px; height: 8px;
    border-radius: 50%; background: var(--accent2);
    box-shadow: 0 0 6px var(--accent2);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: calc(env(safe-area-inset-top) + 63px); z-index: 9;
  }
  .tab {
    padding: 12px 8px 10px; text-align: center;
    font-size: 12px; font-weight: 500; color: var(--muted);
    cursor: pointer; border: none; background: none;
    transition: color 0.15s; letter-spacing: 0.2px;
    position: relative;
  }
  .tab.active { color: var(--accent); }
  .tab.active::after {
    content: ''; position: absolute;
    bottom: 0; left: 20%; right: 20%;
    height: 2px; background: var(--accent);
    border-radius: 2px 2px 0 0;
  }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 3px; }
  .panel { display: none; padding: 20px; animation: fadeIn 0.2s; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
  }
  textarea {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; color: var(--text);
    font-size: 15px; font-family: var(--font);
    line-height: 1.5; resize: none; outline: none;
    min-height: 130px; transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(108,99,255,0.5); }
  textarea::placeholder { color: var(--muted); }
  input[type="text"], input[type="url"] {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 13px 16px; color: var(--text);
    font-size: 15px; font-family: var(--font);
    outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: rgba(108,99,255,0.5); }
  input::placeholder { color: var(--muted); }
  .btn {
    width: 100%; padding: 15px; border: none;
    border-radius: 14px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: transform 0.1s, opacity 0.15s;
    letter-spacing: -0.2px; font-family: var(--font);
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-teal { background: var(--accent2); color: #0a0a14; }
  .btn-outline { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .spacer { height: 14px; }
  .spacer-sm { height: 10px; }
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 30px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,30,0.95);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 30px; padding: 11px 22px;
    font-size: 14px; font-weight: 500; color: var(--text);
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .t-icon { margin-right: 6px; }
  .upload-area {
    border: 1.5px dashed var(--border); border-radius: var(--radius);
    padding: 32px 20px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative; overflow: hidden;
  }
  .upload-area:active { border-color: var(--accent); background: rgba(108,99,255,0.05); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 36px; margin-bottom: 10px; display: block; }
  .upload-area h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .upload-area p { font-size: 13px; color: var(--muted); }
  .progress-bar {
    height: 4px; background: var(--border); border-radius: 2px;
    overflow: hidden; display: none; margin-top: 12px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px; transition: width 0.3s; width: 0%;
  }
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 13px 15px;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .h-icon {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; margin-top: 1px;
  }
  .h-icon.link { background: rgba(0,212,170,0.12); }
  .h-icon.file { background: rgba(255,107,157,0.12); }
  .h-text { flex: 1; min-width: 0; }
  .h-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .h-sub { font-size: 11px; color: var(--muted); }
  .empty-state {
    text-align: center; padding: 36px 20px;
    color: var(--muted); font-size: 13px;
    border: 1px dashed var(--border); border-radius: 14px;
  }
  .empty-state .em { font-size: 32px; margin-bottom: 10px; display: block; opacity: 0.5; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <h1>PhoneBridge</h1>
  <div class="status-dot"></div>
</header>

<div class="tabs">
  <button class="tab active" data-panel="clipboard">
    <span class="tab-icon">📋</span>Clipboard
  </button>
  <button class="tab" data-panel="files">
    <span class="tab-icon">📁</span>Files
  </button>
  <button class="tab" data-panel="links">
    <span class="tab-icon">🔗</span>Links
  </button>
</div>

<div id="tab-clipboard" class="panel active">
  <p class="section-label">Send text or clipboard</p>
  <textarea id="clip-text" placeholder="Paste or type anything — text, code, notes, addresses…" rows="5"></textarea>
  <div class="spacer-sm"></div>
  <button class="btn btn-primary" onclick="sendClipboard()">Send to PC clipboard</button>
  <div class="spacer"></div>
  <button class="btn btn-outline" onclick="pasteFromPhone()">📲 Paste from phone clipboard</button>
</div>

<div id="tab-files" class="panel">
  <p class="section-label">Send a file</p>
  <div class="upload-area">
    <input type="file" id="file-input" multiple onchange="handleFiles(this.files)">
    <span class="upload-icon">☁️</span>
    <h3>Tap to choose file</h3>
    <p>Any file type — saved to Downloads/PhoneBridge</p>
  </div>
  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="spacer"></div>
  <div id="recent-files">
    <p class="section-label">Recent transfers</p>
    <div class="empty-state"><span class="em">📭</span>No files yet</div>
  </div>
</div>

<div id="tab-links" class="panel">
  <p class="section-label">Push a link</p>
  <input type="url" id="link-url" placeholder="https://...">
  <div class="spacer-sm"></div>
  <input type="text" id="link-title" placeholder="Title (optional)">
  <div class="spacer-sm"></div>
  <button class="btn btn-teal" onclick="sendLink()">Send link to PC</button>
  <div class="spacer"></div>
  <div id="recent-links">
    <p class="section-label">Sent links</p>
    <div class="empty-state"><span class="em">🔗</span>No links yet</div>
  </div>
</div>

<div class="toast" id="toast"><span class="t-icon">✓</span><span id="toast-msg"></span></div>

<script>
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + t.dataset.panel).classList.add('active');
    t.classList.add('active');
    if (t.dataset.panel !== 'clipboard') loadHistory(t.dataset.panel);
  };
});

function toast(msg, emoji = '✓') {
  const t = document.getElementById('toast');
  document.querySelector('.t-icon').textContent = emoji + ' ';
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function sendClipboard() {
  const text = document.getElementById('clip-text').value.trim();
  if (!text) { toast('Nothing to send', '⚠️'); return; }
  try {
    const r = await fetch('/clipboard', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ text }) });
    if (r.ok) { toast('Copied to PC clipboard!', '📋'); document.getElementById('clip-text').value = ''; }
  } catch { toast('Connection error', '❌'); }
}

async function pasteFromPhone() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('clip-text').value = text;
    toast('Pasted from phone', '📲');
  } catch { toast('Enable clipboard in Safari', '⚠️'); }
}

async function sendLink() {
  const url = document.getElementById('link-url').value.trim();
  const title = document.getElementById('link-title').value.trim();
  if (!url) { toast('Enter a URL first', '⚠️'); return; }
  try {
    const r = await fetch('/link', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ url, title: title || url }) });
    if (r.ok) {
      toast('Link sent to PC!', '🔗');
      document.getElementById('link-url').value = '';
      document.getElementById('link-title').value = '';
      loadHistory('links');
    }
  } catch { toast('Connection error', '❌'); }
}

async function handleFiles(fileList) {
  for (const file of fileList) {
    const bar = document.getElementById('progress-bar');
    const fill = document.getElementById('progress-fill');
    bar.style.display = 'block';
    fill.style.width = '10%';
    const fd = new FormData();
    fd.append('file', file);
    try {
      fill.style.width = '50%';
      const r = await fetch('/file', { method: 'POST', body: fd });
      fill.style.width = '100%';
      if (r.ok) { toast(`${file.name} sent!`, '📁'); loadHistory('files'); }
      else { toast('Upload failed', '❌'); }
    } catch { toast('Connection error', '❌'); }
    setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0%'; }, 800);
  }
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadHistory(type) {
  try {
    const r = await fetch('/state');
    const data = await r.json();
    if (type === 'files') {
      const el = document.getElementById('recent-files');
      if (!data.files.length) { el.innerHTML = '<p class="section-label">Recent transfers</p><div class="empty-state"><span class="em">📭</span>No files yet</div>'; return; }
      el.innerHTML = '<p class="section-label">Recent transfers</p>' + data.files.map(f => `
        <div class="history-item">
          <div class="h-icon file">📄</div>
          <div class="h-text">
            <div class="h-title">${escapeHtml(f.name)}</div>
            <div class="h-sub">${formatSize(f.size)} · ${timeAgo(f.time)}</div>
          </div>
        </div>`).join('');
    }
    if (type === 'links') {
      const el = document.getElementById('recent-links');
      if (!data.links.length) { el.innerHTML = '<p class="section-label">Sent links</p><div class="empty-state"><span class="em">🔗</span>No links yet</div>'; return; }
      el.innerHTML = '<p class="section-label">Sent links</p>' + data.links.map(l => `
        <div class="history-item">
          <div class="h-icon link">🔗</div>
          <div class="h-text">
            <div class="h-title">${escapeHtml(l.title)}</div>
            <div class="h-sub">${timeAgo(l.time)}</div>
          </div>
        </div>`).join('');
    }
  } catch {}
}
</script>
</body>
</html>
